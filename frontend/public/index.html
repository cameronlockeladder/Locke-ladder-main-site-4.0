<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#111111" />

        <!--
          STAGING / PROTOTYPE defaults below. Route-specific title, description, canonical,
          Open Graph, robots, and JSON-LD are set at runtime by src/components/seo/Seo.jsx.

          PRODUCTION PORT (see TEMPLATE_HANDOFF.md):
          - Move per-route meta + JSON-LD into a static or SSR <head> (Next.js / Vercel).
          - Switch robots from noindex,nofollow to index,follow via src/data/siteMeta.js (ROBOTS).
          - Set the real canonical/OG domain and host /images and /fonts on that domain.
        -->
        <title>Locke & Ladder - Premium Exterior Design and Roofing</title>
        <meta
            name="description"
            content="Premium roofing, siding, windows, doors, gutters, and exterior decisions for high-end homes in Indianapolis and Chicago suburbs."
        />
        <meta name="robots" content="noindex,nofollow" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link rel="preload" href="%PUBLIC_URL%/fonts/TerminaTest-Heavy.woff2" as="font" type="font/woff2" crossorigin />
        <link rel="preload" href="%PUBLIC_URL%/fonts/TerminaTest-Medium.woff2" as="font" type="font/woff2" crossorigin />
        <link rel="preload" as="image" href="%PUBLIC_URL%/images/hero-home.jpg" fetchpriority="high" />

        <style>
            /* Termina (Test build, from Locke & Ladder brand assets). Covers A-Z a-z 0-9 , . - and space.
               Inter is the per-glyph fallback for &, $, middle-dot and other characters.
               PRODUCTION: replace with a fully licensed Termina (full glyph set). */
            @font-face {
                font-family: "Termina Test";
                src: url("/fonts/TerminaTest-Medium.woff2") format("woff2");
                font-weight: 500;
                font-style: normal;
                font-display: swap;
            }
            @font-face {
                font-family: "Termina Test";
                src: url("/fonts/TerminaTest-Heavy.woff2") format("woff2");
                font-weight: 800;
                font-style: normal;
                font-display: swap;
            }
        </style>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>

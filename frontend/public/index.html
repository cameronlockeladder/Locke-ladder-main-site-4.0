              "@type": "Question",
              "name": "What does a Brava synthetic cedar roof cost?",
              "acceptedAnswer": { "@type": "Answer", "text": "Based on our active estimate data, a Brava synthetic cedar roof has a median of $118,133, with a middle range of $97,908 to $126,063 across twenty recent estimates. The final number depends on roof size, pitch, access, flashing, and the rest of the system. Treat this as a planning range, not a final quote." }
            },
            {
              "@type": "Question",
              "name": "When is Brava worth it?",
              "acceptedAnswer": { "@type": "Answer", "text": "Brava is worth considering when the home deserves the character of cedar or slate but the owner wants lower maintenance and a longer material life than traditional wood shake. It holds heavy texture and shadow lines while resisting the rot, insects, and weathering that age real cedar." }
            },
            {
              "@type": "Question",
              "name": "Is Locke & Ladder the cheapest contractor?",
              "acceptedAnswer": { "@type": "Answer", "text": "Usually not. A cheaper bid often leaves out flashing, ventilation, tear-off assumptions, trim, correct gutter sizing, supervision, or cleanup. We price the real scope, so the number you see is the number that finishes the job correctly." }
            },
            {
              "@type": "Question",
              "name": "Which roofing material is best for a high-end home?",
              "acceptedAnswer": { "@type": "Answer", "text": "There is no single best material. The right choice depends on the architecture of the home, the budget, the performance you need, and how long you plan to stay. We walk through those tradeoffs before recommending a system." }
            },
            {
              "@type": "Question",
              "name": "Do you handle insurance claims?",
              "acceptedAnswer": { "@type": "Answer", "text": "You file the claim. We document the damage, meet the adjuster, review the scope, and explain what should be repaired or replaced. You stay in control of the claim while we make sure the scope reflects the real condition of the exterior." }
            },
            {
              "@type": "Question",
              "name": "Do you only do roofing?",
              "acceptedAnswer": { "@type": "Answer", "text": "No. We handle roofing, siding, windows, doors, gutters, gutter guards, soffit, fascia, trim, insurance claims, and commercial exterior work. The exterior is one connected system, so we look at how the parts work together." }
            },
            {
              "@type": "Question",
              "name": "What should a homeowner look for in a contractor quote?",
              "acceptedAnswer": { "@type": "Answer", "text": "A complete quote names materials and quantities, flashing details, the ventilation plan, tear-off assumptions, exclusions, warranty information, project management expectations, and cleanup standards. It should read like a specification, not a single line." }
            },
            {
              "@type": "Question",
              "name": "What makes a quote incomplete?",
              "acceptedAnswer": { "@type": "Answer", "text": "An incomplete quote gives only a product name and a total price. It hides the scope, which is exactly where cost, performance, and risk actually live." }
            }
          ]
        }
